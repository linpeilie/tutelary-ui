syntax="proto3";
package com.tutelary.message.command;
option java_outer_classname = "ThreadCommandResult$$ByJProtobuf";
//
message ThreadCommandResult {  
 ThreadOverview threadOverview=1;
repeated ThreadInfo threads=2;
 int32 jobId=3;
 int32 state=4;
 string message=5;
}
//
message ThreadInfo {  
}
//
message ThreadOverview {  
 int32 threadCount=1;
 int32 peakThreadCount=2;
 int32 daemonThreadCount=3;
 int64 totalStartedThreadCount=4;
}
